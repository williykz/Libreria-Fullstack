databaseChangeLog:
  - changeSet:
      id: 001-create-clientes
      author: williams
      changes:
        - createTable:
            tableName: clientes
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: rut
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
                    unique: true

              - column:
                  name: nombre
                  type: VARCHAR(100)
                  constraints:
                    nullable: false

              - column:
                  name: apellido
                  type: VARCHAR(100)
                  constraints:
                    nullable: false

              - column:
                  name: correo
                  type: VARCHAR(100)
                  constraints:
                    nullable: false

              - column:
                  name: telefono
                  type: VARCHAR(20)
                  constraints:
                    nullable: false

              - column:
                  name: direccion
                  type: VARCHAR(150)
                  constraints:
                    nullable: false

              - column:
                  name: activo
                  type: BOOLEAN

