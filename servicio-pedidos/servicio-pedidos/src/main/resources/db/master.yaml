                  constraints:
                    nullable: false

              - column:
                  name: cantidad
                  type: INT
                  constraints:
                    nullable: false

              - column:
                  name: precio_unitario
                  type: DOUBLE
                  constraints:
                    nullable: false

              - column:
                  name: subtotal
                  type: DOUBLE

              - column:
                  name: pedido_id
                  type: BIGINT
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: detalle_pedido
            baseColumnNames: pedido_id
            referencedTableName: pedido
            referencedColumnNames: id
            constraintName: fk_detalle_pedido_pedido

