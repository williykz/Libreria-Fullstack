databaseChangeLog:
  - changeSet:
      id: 001-create-pedido
      author: williams
      changes:
        - createTable:
            tableName: pedido
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: cliente_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: fecha_pedido
                  type: DATE

              - column:
                  name: estado
                  type: VARCHAR(50)

              - column:
                  name: total
                  type: DOUBLE

  - changeSet:
