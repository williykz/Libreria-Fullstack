databaseChangeLog:
  - changeSet:
      id: 001-create-libro
      author: williams
      changes:
        - createTable:
            tableName: libro
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: titulo
                  type: VARCHAR(100)
                  constraints:
                    nullable: false

              - column:
                  name: autor
                  type: VARCHAR(100)
                  constraints:
                    nullable: false

              - column:
                  name: isbn
                  type: VARCHAR(30)
                  constraints:
                    nullable: false
                    unique: true

              - column:
                  name: categoria
                  type: VARCHAR(80)
                  constraints:
                    nullable: false

              - column:
                  name: precio
                  type: DOUBLE
                  constraints:
                    nullable: false

              - column:
                  name: anio_publicacion
                  type: INT
                  constraints:
                    nullable: false

              - column:
                  name: editorial_id
                  type: BIGINT

              - column:
                  name: activo
                  type: BOOLEAN

  - changeSet:
      id: 002-insert-libros
      author: williams
